
name: CI


on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: install dependencies
        run: | 
          pip install -r app/requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app/


  deploy:
    needs: ci
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Login to Github Container
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      
      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ghcr.io/mleski1997/cloud-native:${{ github.sha }}

      - name: Apply docker pull and run
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deployer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ghcr.io/mleski1997/cloud-native:${{ github.sha }}
            docker stop cloud-native || true
            docker rm cloud-native || true
            docker run -d --name cloud-native -p 8000:8000 ghcr.io/mleski1997/cloud-native:${{ github.sha }}

        