name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi

      - name: Run lint
        run: ruff check app/
      
  build:
    needs: lint
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to github container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
            

  cd:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name:  Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
         
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.docker ansible.posix

      - name: Create inventory file
        run: |
          mkdir -p ansible/inventory
          cat <<EOF > ansible/inventory/hosts
          [servers]
          ${{ secrets.HETZNER_HOST }} ansible_user=deployer ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF
        

      - name: Run ansible playbook
        run: |
          ansible-playbook -i ansible/inventory/hosts ansible/site.yml -e "app_version=${{ github.sha }}" -e app_image=ghcr.io/${{ github.repository }}

      